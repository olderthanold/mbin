<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>llm129</title>
    <style>
        :root {
            color-scheme: dark;
        }

        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background: #1e1e1e;
            color: #f0f0f0;
        }

        h1 {
            margin-top: 0;
        }

        .llm-panel {
            margin: 14px 0 18px;
            padding: 14px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #0b1220;
        }

        .controls {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        button,
        .button-link {
            display: inline-block;
            padding: 10px 14px;
            border: 0;
            border-radius: 6px;
            background: #2563eb;
            color: #fff;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
        }

        button:hover,
        .button-link:hover {
            background: #1d4ed8;
        }

        #llm-embed {
            width: 100%;
            min-height: 580px;
            border: 1px solid #334155;
            border-radius: 8px;
            background: #000;
            margin-top: 10px;
        }

        .hidden {
            display: none;
        }

        #status {
            margin: 12px 0 16px;
            color: #cbd5e1;
        }

        #links {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        #links li {
            margin: 8px 0;
        }

        #links a {
            display: block;
            padding: 10px;
            border-left: 4px solid #3b82f6;
            background: #2b2b2b;
            color: #e2e8f0;
            text-decoration: none;
        }

        #links a:hover {
            background: #3a3a3a;
        }
    </style>
</head>
<body>
    <h1 id="page-title">llm129 home</h1>

    <section class="llm-panel">
        <h2>LLM Access</h2>
        <p>Use the link to open the LLM UI in a new tab, or embed it below via iframe.</p>
        <div class="controls">
            <a id="llm-open-link" class="button-link" href="/llama/" target="_blank" rel="noopener noreferrer">Open LLM in new tab</a>
            <button id="toggle-iframe" type="button">Show embedded LLM</button>
        </div>
        <iframe id="llm-embed" class="hidden" src="/llama/" title="llama.cpp web UI"></iframe>
    </section>

    <h2>Static HTML pages</h2>
    <div class="controls">
        <button id="refresh-list" type="button">Refresh page list</button>
    </div>
    <p id="status">Loading known site pages...</p>
    <ul id="links"></ul>

    <!-- Local script only (no external dependencies). -->
    <script src="index.js" defer></script>
</body>
</html>
